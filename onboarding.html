<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00C864">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Vendix">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>Configura tu negocio — Vendix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --g:#00C864;--gl:#34D399;--gd:#059669;
  --navy:#05100B;--navy2:#0B1E13;
  --border:rgba(0,200,100,.13);
  --t1:#F0FDF4;--t2:#A7C4B0;--t3:#4B7A64;
}
html,body{height:100%;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
body{background:var(--navy);color:var(--t1);display:flex;flex-direction:column;min-height:100vh}

/* ── TOP BAR ── */
.topbar{height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;border-bottom:1px solid var(--border);background:rgba(5,16,11,.9);backdrop-filter:blur(16px);position:sticky;top:0;z-index:20}
.logo{display:flex;align-items:center;gap:9px;font-size:18px;font-weight:900;color:#fff;text-decoration:none}
.logo-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--g),var(--gd));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff}
.topbar-skip{font-size:13px;font-weight:600;color:var(--t3);text-decoration:none;transition:color .2s}
.topbar-skip:hover{color:var(--t2)}

/* ── PROGRESS ── */
.progress-wrap{background:var(--navy2);border-bottom:1px solid var(--border);padding:20px 32px}
.progress-inner{max-width:700px;margin:0 auto;display:flex;align-items:center;gap:0}
.step-pill{display:flex;align-items:center;gap:10px;flex:1}
.step-num{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;transition:all .3s;flex-shrink:0}
.step-num.done{background:var(--g);color:#fff;box-shadow:0 4px 12px rgba(0,200,100,.4)}
.step-num.active{background:rgba(0,200,100,.15);border:2px solid var(--g);color:var(--g)}
.step-num.pending{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);color:var(--t3)}
.step-label{font-size:12px;font-weight:600;transition:color .3s}
.step-label.active{color:#fff}
.step-label.done{color:var(--gl)}
.step-label.pending{color:var(--t3)}
.step-line{flex:1;height:2px;background:rgba(255,255,255,.08);margin:0 8px;transition:background .3s}
.step-line.done{background:var(--g)}

/* ── MAIN ── */
main{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:48px 24px}
.card{background:rgba(11,30,19,.7);border:1px solid var(--border);border-radius:24px;width:100%;max-width:660px;backdrop-filter:blur(16px);overflow:hidden}
.card-header{padding:36px 40px 0}
.step-icon-circle{width:60px;height:60px;border-radius:18px;display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.card-header h2{font-size:26px;font-weight:900;letter-spacing:-.8px;color:#fff;margin-bottom:8px}
.card-header p{font-size:15px;color:var(--t2);line-height:1.65}
.card-body{padding:32px 40px}
.card-footer{padding:0 40px 36px;display:flex;align-items:center;justify-content:space-between;gap:12px}

/* ── FORM ── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-row.single{grid-template-columns:1fr}
.field label{display:block;font-size:12px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}
.field input,.field select,.field textarea{width:100%;background:rgba(0,200,100,.04);border:1px solid var(--border);border-radius:11px;padding:13px 16px;font-size:14px;font-weight:500;color:#fff;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
.field input::placeholder,.field textarea::placeholder{color:var(--t3)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:rgba(0,200,100,.4);background:rgba(0,200,100,.07)}
.field select option{background:#0B1E13;color:#fff}
.field textarea{resize:vertical;min-height:80px}
.field-hint{font-size:11px;color:var(--t3);margin-top:5px}

/* ── BUTTONS ── */
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--g);color:#fff;padding:14px 28px;border-radius:12px;font-size:15px;font-weight:700;border:none;cursor:pointer;transition:all .22s;box-shadow:0 6px 20px rgba(0,200,100,.35)}
.btn-primary:hover{background:var(--gd);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-ghost{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.05);color:var(--t2);padding:14px 22px;border-radius:12px;font-size:14px;font-weight:600;border:1px solid rgba(255,255,255,.08);cursor:pointer;transition:all .22s;text-decoration:none}
.btn-ghost:hover{background:rgba(255,255,255,.09);color:#fff}

/* ── STEP 3 SUCCESS ITEMS ── */
.success-items{display:flex;flex-direction:column;gap:12px;margin-bottom:8px}
.success-item{display:flex;align-items:center;gap:14px;background:rgba(0,200,100,.05);border:1px solid var(--border);border-radius:14px;padding:16px 18px}
.success-item-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.success-item h4{font-size:14px;font-weight:700;color:#fff;margin-bottom:3px}
.success-item p{font-size:12px;color:var(--t3)}
.success-item a{font-size:12px;color:var(--g);font-weight:600;text-decoration:none}
.success-item a:hover{text-decoration:underline}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:#fff;color:#0f172a;border-radius:12px;padding:14px 20px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.3);transform:translateY(80px);opacity:0;transition:all .3s;z-index:100;max-width:320px}
.toast.show{transform:translateY(0);opacity:1}
.toast-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── SKIP BANNER ── */
.skip-banner{background:rgba(0,200,100,.06);border:1px solid rgba(0,200,100,.15);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:14px}
.skip-banner p{font-size:13px;color:var(--t2);flex:1}
.skip-banner a{font-size:13px;font-weight:700;color:var(--g);text-decoration:none;white-space:nowrap}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .card-header,.card-body,.card-footer{padding-left:24px;padding-right:24px}
  .form-row{grid-template-columns:1fr}
  .topbar{padding:0 16px}
  .progress-wrap{padding:16px}
  main{padding:24px 12px}
}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="logo">
    <div class="logo-icon">V</div>Vendix
  </a>
  <a href="index.html" class="topbar-skip" onclick="skipOnboarding()">Saltar configuración →</a>
</div>

<div class="progress-wrap">
  <div class="progress-inner" id="progressInner">
    <!-- rendered by JS -->
  </div>
</div>

<main>
  <div class="card" id="card">
    <!-- rendered by JS -->
  </div>
</main>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-icon" id="toastIcon"></div>
  <span id="toastMsg"></span>
</div>

<script src="api-client.js"></script>
<script>
const STEPS = [
  { label: 'Tu primer producto', icon: '📦' },
  { label: 'Tu primer vendedor', icon: '👤' },
  { label: '¡Todo listo!',       icon: '🎉' },
];
let currentStep = 0;

function skipOnboarding() {
  localStorage.setItem('vendix_onboarded', '1');
}

function renderProgress() {
  const el = document.getElementById('progressInner');
  el.innerHTML = STEPS.map((s, i) => {
    const state = i < currentStep ? 'done' : i === currentStep ? 'active' : 'pending';
    const numContent = state === 'done'
      ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>'
      : (i + 1);
    return `
      ${i > 0 ? `<div class="step-line ${i <= currentStep ? 'done' : ''}"></div>` : ''}
      <div class="step-pill">
        <div class="step-num ${state}">${numContent}</div>
        <span class="step-label ${state}">${s.label}</span>
      </div>
    `;
  }).join('');
}

/* ─── STEP 1: Add product ─── */
function renderStep1() {
  document.getElementById('card').innerHTML = `
    <div class="card-header">
      <div class="step-icon-circle" style="background:rgba(0,200,100,.1)">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--g)" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
      </div>
      <h2>Agrega tu primer producto</h2>
      <p>Comienza con un producto de tu inventario. Puedes agregar los demás después.</p>
    </div>
    <div class="card-body">
      <div class="skip-banner">
        <p>¿Prefieres configurar tu inventario después?</p>
        <a href="#" onclick="goStep(1);return false">Saltar este paso →</a>
      </div>
      <div class="form-row">
        <div class="field">
          <label>Nombre del producto *</label>
          <input type="text" id="p_name" placeholder="Ej: Polo básico blanco" maxlength="100">
        </div>
        <div class="field">
          <label>Categoría</label>
          <input type="text" id="p_cat" placeholder="Ej: Ropa, Calzado...">
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label>Precio de venta (S/.) *</label>
          <input type="number" id="p_price" placeholder="0.00" min="0" step="0.01">
        </div>
        <div class="field">
          <label>Costo (S/.)</label>
          <input type="number" id="p_cost" placeholder="0.00" min="0" step="0.01">
          <div class="field-hint">Para calcular tu ganancia</div>
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label>Stock inicial *</label>
          <input type="number" id="p_stock" placeholder="0" min="0">
        </div>
        <div class="field">
          <label>Stock mínimo (alerta)</label>
          <input type="number" id="p_minstock" placeholder="5" min="0">
          <div class="field-hint">Te avisamos si baja de aquí</div>
        </div>
      </div>
    </div>
    <div class="card-footer">
      <span></span>
      <button class="btn-primary" onclick="saveProduct()" id="btnSaveProduct">
        Guardar y continuar
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  `;
}

async function saveProduct() {
  const name = document.getElementById('p_name').value.trim();
  const price = parseFloat(document.getElementById('p_price').value);
  const stock = parseInt(document.getElementById('p_stock').value);
  if (!name || isNaN(price) || isNaN(stock)) {
    showToast('error', 'Completa nombre, precio y stock');
    return;
  }
  const btn = document.getElementById('btnSaveProduct');
  btn.disabled = true; btn.textContent = 'Guardando...';
  try {
    await apiFetch('/products', {
      method: 'POST',
      body: {
        name,
        category: document.getElementById('p_cat').value.trim() || 'General',
        price,
        cost: parseFloat(document.getElementById('p_cost').value) || 0,
        stock,
        min_stock: parseInt(document.getElementById('p_minstock').value) || 5,
      }
    });
    showToast('success', '¡Producto guardado!');
    setTimeout(() => goStep(1), 700);
  } catch(e) {
    showToast('error', 'Error al guardar. Intenta de nuevo.');
    btn.disabled = false;
    btn.innerHTML = 'Guardar y continuar <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
  }
}

/* ─── STEP 2: Add seller ─── */
function renderStep2() {
  document.getElementById('card').innerHTML = `
    <div class="card-header">
      <div class="step-icon-circle" style="background:rgba(139,92,246,.1)">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <h2>Crea tu primer vendedor</h2>
      <p>Cada vendedor tiene su propia cuenta y solo ve sus ventas. Tú ves todo.</p>
    </div>
    <div class="card-body">
      <div class="skip-banner">
        <p>¿Solo eres tú por ahora?</p>
        <a href="#" onclick="goStep(2);return false">Saltar este paso →</a>
      </div>
      <div class="form-row">
        <div class="field">
          <label>Nombre completo *</label>
          <input type="text" id="s_name" placeholder="Ej: Ana Torres" maxlength="80">
        </div>
        <div class="field">
          <label>Usuario *</label>
          <input type="text" id="s_user" placeholder="Ej: ana123" maxlength="40">
          <div class="field-hint">Con esto inicia sesión</div>
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label>Contraseña *</label>
          <input type="password" id="s_pass" placeholder="Mínimo 6 caracteres">
        </div>
        <div class="field">
          <label>WhatsApp</label>
          <input type="tel" id="s_phone" placeholder="51912345678">
          <div class="field-hint">Opcional, para contacto</div>
        </div>
      </div>
    </div>
    <div class="card-footer">
      <button class="btn-ghost" onclick="goStep(0)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Atrás
      </button>
      <button class="btn-primary" onclick="saveSeller()" id="btnSaveSeller">
        Crear vendedor
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  `;
}

async function saveSeller() {
  const fullName = document.getElementById('s_name').value.trim();
  const username = document.getElementById('s_user').value.trim().toLowerCase();
  const password = document.getElementById('s_pass').value;
  if (!fullName || !username || password.length < 6) {
    showToast('error', 'Completa nombre, usuario y contraseña (mín. 6 caracteres)');
    return;
  }
  const btn = document.getElementById('btnSaveSeller');
  btn.disabled = true; btn.textContent = 'Creando...';
  try {
    await apiFetch('/sellers', {
      method: 'POST',
      body: {
        full_name: fullName,
        username,
        password,
        phone: document.getElementById('s_phone').value.trim() || null,
      }
    });
    showToast('success', '¡Vendedor creado!');
    setTimeout(() => goStep(2), 700);
  } catch(e) {
    const msg = e.message || '';
    if (msg.includes('duplicate') || msg.includes('unique') || msg.includes('ya existe')) {
      showToast('error', 'Ese usuario ya existe. Elige otro nombre de usuario.');
    } else {
      showToast('error', 'Error al crear. Intenta de nuevo.');
    }
    btn.disabled = false;
    btn.innerHTML = 'Crear vendedor <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
  }
}

/* ─── STEP 3: Done ─── */
function renderStep3() {
  document.getElementById('card').innerHTML = `
    <div class="card-header">
      <div class="step-icon-circle" style="background:rgba(0,200,100,.12)">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--g)" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2>¡Tu negocio está listo! 🎉</h2>
      <p>Ya tienes todo configurado. Aquí te dejamos los accesos rápidos para empezar:</p>
    </div>
    <div class="card-body">
      <div class="success-items">
        <div class="success-item">
          <div class="success-item-icon" style="background:rgba(0,200,100,.1)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--g)" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          </div>
          <div style="flex:1">
            <h4>Inventario</h4>
            <p>Agrega más productos y controla tu stock</p>
          </div>
          <a href="inventory.html">Ir →</a>
        </div>
        <div class="success-item">
          <div class="success-item-icon" style="background:rgba(245,158,11,.1)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          </div>
          <div style="flex:1">
            <h4>Nueva venta</h4>
            <p>Registra tu primera venta ahora mismo</p>
          </div>
          <a href="sales.html">Ir →</a>
        </div>
        <div class="success-item">
          <div class="success-item-icon" style="background:rgba(139,92,246,.1)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          </div>
          <div style="flex:1">
            <h4>Vendedores</h4>
            <p>Gestiona los accesos de tu equipo</p>
          </div>
          <a href="sellers.html">Ir →</a>
        </div>
        <div class="success-item">
          <div class="success-item-icon" style="background:rgba(34,158,217,.1)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="color:#229ED9"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
          </div>
          <div style="flex:1">
            <h4>Bot de Telegram</h4>
            <p>Gestiona todo desde tu celular en Telegram</p>
          </div>
          <a href="https://t.me/vendixadmin_bot" target="_blank">Abrir →</a>
        </div>
      </div>
    </div>
    <div class="card-footer">
      <span></span>
      <a href="index.html" class="btn-primary" onclick="localStorage.setItem('vendix_onboarded','1')">
        Ir al Dashboard
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
    </div>
  `;
}

/* ─── NAV ─── */
function goStep(n) {
  currentStep = n;
  renderProgress();
  if (n === 0) renderStep1();
  else if (n === 1) renderStep2();
  else renderStep3();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ─── TOAST ─── */
let toastTimer;
function showToast(type, msg) {
  const el = document.getElementById('toast');
  const icon = document.getElementById('toastIcon');
  document.getElementById('toastMsg').textContent = msg;
  if (type === 'success') {
    icon.style.background = 'rgba(0,200,100,.15)';
    icon.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--g)" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>';
  } else {
    icon.style.background = 'rgba(239,68,68,.12)';
    icon.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  }
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

/* ─── INIT ─── */
(function init() {
  const token = localStorage.getItem('authToken');
  if (!token) { window.location.href = 'login.html'; return; }
  try {
    const p = JSON.parse(atob(token.split('.')[1]));
    if (p.role !== 'admin') { window.location.href = 'index.html'; return; }
  } catch {}
  renderProgress();
  renderStep1();
})();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
