<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00C864">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Vendix">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>Recibo — Vendix</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Courier New', monospace; background: #f4f4f4; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 24px 16px; }
  .receipt { background: #fff; width: 100%; max-width: 380px; padding: 32px 24px; border-radius: 8px; box-shadow: 0 4px 24px rgba(0,0,0,.1); }
  .logo { text-align: center; font-size: 22px; font-weight: 900; letter-spacing: 2px; color: #059669; margin-bottom: 4px; }
  .tagline { text-align: center; font-size: 11px; color: #888; margin-bottom: 20px; }
  .divider { border: none; border-top: 1px dashed #ccc; margin: 16px 0; }
  .biz-name { text-align: center; font-size: 15px; font-weight: 700; color: #111; margin-bottom: 4px; }
  .meta { font-size: 11px; color: #666; display: flex; justify-content: space-between; margin-bottom: 4px; }
  .receipt-num { text-align: center; font-size: 12px; color: #999; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
  th { font-size: 10px; text-transform: uppercase; color: #999; text-align: left; padding-bottom: 6px; border-bottom: 1px solid #eee; }
  th:last-child, td:last-child { text-align: right; }
  td { font-size: 12px; padding: 6px 0; color: #333; border-bottom: 1px solid #f0f0f0; }
  .totals { margin-top: 8px; }
  .total-row { display: flex; justify-content: space-between; font-size: 12px; color: #555; margin-bottom: 4px; }
  .total-row.grand { font-size: 16px; font-weight: 900; color: #111; margin-top: 8px; }
  .payment { text-align: center; font-size: 11px; color: #888; margin-top: 12px; }
  .seller { text-align: center; font-size: 11px; color: #888; margin-top: 4px; }
  .footer { text-align: center; font-size: 10px; color: #bbb; margin-top: 20px; }
  .print-btn { display: block; width: 100%; margin-top: 20px; padding: 12px; background: #059669; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .print-btn:hover { background: #4338ca; }
  .loading { text-align: center; padding: 60px 0; color: #999; font-size: 14px; }
  .error { text-align: center; padding: 60px 0; color: #e00; font-size: 14px; }
  @media print { .print-btn { display: none; } body { background: #fff; padding: 0; } .receipt { box-shadow: none; } }
</style>
</head>
<body>
<div class="receipt" id="receipt">
  <div class="loading">Cargando recibo...</div>
</div>

<script>
const id = new URLSearchParams(location.search).get('id');
if (!id) {
  document.getElementById('receipt').innerHTML = '<div class="error">❌ Recibo no encontrado.</div>';
} else {
  fetch(`/api/receipt/${id}`)
    .then(r => r.json())
    .then(tx => {
      if (tx.error) throw new Error(tx.error);
      const date = new Date(tx.date);
      const fmt  = date.toLocaleString('es-PE', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
      const num  = String(tx.id).padStart(6, '0');
      const items = (tx.items || []).filter(i => i && i.name);
      const rows  = items.map(i => `
        <tr>
          <td>${i.name}</td>
          <td style="text-align:center">x${i.quantity}</td>
          <td>S/. ${parseFloat(i.unit_price).toFixed(2)}</td>
          <td>S/. ${parseFloat(i.total).toFixed(2)}</td>
        </tr>`).join('');

      document.getElementById('receipt').innerHTML = `
        <div class="logo">VENDIX</div>
        <div class="tagline">Sistema de gestión de ventas</div>
        <hr class="divider">
        <div class="biz-name">${tx.business_name || ''}</div>
        <div class="receipt-num">Recibo #${num}</div>
        <div class="meta"><span>📅 ${fmt}</span><span>💳 ${tx.payment_method || 'Efectivo'}</span></div>
        <hr class="divider">
        <table>
          <thead><tr><th>Producto</th><th style="text-align:center">Cant.</th><th>P/U</th><th>Total</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <hr class="divider">
        <div class="totals">
          <div class="total-row"><span>Subtotal</span><span>S/. ${parseFloat(tx.subtotal||tx.total).toFixed(2)}</span></div>
          <div class="total-row grand"><span>TOTAL</span><span>S/. ${parseFloat(tx.total).toFixed(2)}</span></div>
        </div>
        <div class="payment">Método de pago: <b>${tx.payment_method || 'Efectivo'}</b></div>
        <div class="seller">Vendedor: ${tx.seller_name || '—'}</div>
        <hr class="divider">
        <div class="footer">Gracias por su compra · Powered by Vendix</div>
        <button class="print-btn" onclick="window.print()">🖨️ Imprimir recibo</button>
      `;
    })
    .catch(() => {
      document.getElementById('receipt').innerHTML = '<div class="error">❌ No se pudo cargar el recibo.</div>';
    });
}
</script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");</script>
</body>
</html>
