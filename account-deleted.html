<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta eliminada — Vendix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #060d2e;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: #0f1a3d;
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 24px;
            padding: 56px 48px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 24px 64px rgba(0,0,0,.4);
        }

        .icon-wrap {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            background: rgba(239,68,68,.12);
            border: 1px solid rgba(239,68,68,.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
        }

        .icon-wrap svg { color: #ef4444; }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            margin-bottom: 40px;
            font-size: 18px;
            font-weight: 800;
            color: #f1f5f9;
        }

        .logo-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex; align-items: center; justify-content: center;
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 12px;
            color: #f1f5f9;
        }

        p {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            padding: 12px 28px;
            border-radius: 10px;
            text-decoration: none;
            transition: opacity .15s;
        }

        .btn:hover { opacity: .85; }

        .divider {
            border: none;
            border-top: 1px solid rgba(255,255,255,.07);
            margin: 28px 0;
        }

        .contact {
            font-size: 13px;
            color: #64748b;
        }

        .contact a {
            color: #818cf8;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">
                <svg width="18" height="18" viewBox="0 0 32 32" fill="none">
                    <path d="M8 16L14 22L24 10" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            Vendix
        </div>

        <div class="icon-wrap">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
        </div>

        <h1>Esta cuenta ya no existe</h1>
        <p>La cuenta con la que iniciaste sesión fue eliminada o desactivada. Si crees que esto es un error, contacta al administrador de tu negocio o al soporte de Vendix.</p>

        <a href="login.html" class="btn">Volver al inicio de sesión</a>

        <hr class="divider">

        <p class="contact">
            ¿Necesitas ayuda? Escríbenos a
            <a href="mailto:soporte@vendix.pe">soporte@vendix.pe</a>
        </p>
    </div>
</body>
</html>
