<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago — Vendix</title>
<script src="https://js.culqi.com/checkout-js"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, system-ui, sans-serif;
        background: #09090f; color: #eef0f8;
        min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
        padding: 20px;
    }
    .box {
        background: #111116; border: 1px solid rgba(255,255,255,.08);
        border-radius: 20px; padding: 36px 32px; width: 100%; max-width: 380px;
        text-align: center;
    }
    .logo { font-size: 24px; font-weight: 800; color: #00d46a; margin-bottom: 6px; }
    .sub  { font-size: 14px; color: #7d8799; margin-bottom: 28px; }
    .amount { font-size: 42px; font-weight: 900; margin-bottom: 4px; }
    .amount span { font-size: 18px; color: #7d8799; }
    .period { font-size: 13px; color: #7d8799; margin-bottom: 28px; }
    button {
        width: 100%; padding: 16px;
        background: #00d46a; color: #03120a;
        border: none; border-radius: 12px;
        font-size: 16px; font-weight: 800; cursor: pointer;
        transition: opacity .15s;
    }
    button:hover { opacity: .9; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .secure { font-size: 12px; color: #3e4556; margin-top: 16px; }
    .status { font-size: 13px; color: #7d8799; margin-top: 14px; min-height: 18px; }
</style>
</head>
<body>
    <div class="box">
        <div class="logo">Vendix</div>
        <div class="sub">Licencia mensual</div>
        <div class="amount"><span>S/.</span> 15.99</div>
        <div class="period">por mes</div>
        <button id="payBtn" onclick="pagar()">Pagar con tarjeta</button>
        <div class="status" id="status"></div>
        <div class="secure">🔒 Pago seguro procesado por Culqi</div>
    </div>

<script>
// Public key de Culqi — es pública por diseño, va en el frontend.
const CULQI_PK = 'pk_test_AQBCXE0gad3LsV14';

let culqi = null;

function setStatus(msg) { document.getElementById('status').textContent = msg || ''; }

// Inicializar Culqi de inmediato (sin esperar al backend)
initCulqi(CULQI_PK);

function initCulqi(pk) {
    if (typeof CulqiCheckout === 'undefined') {
        setTimeout(() => initCulqi(pk), 100);
        return;
    }

    culqi = new CulqiCheckout(pk, {
        settings: {
            title:    'Vendix',
            currency: 'PEN',
            amount:   1599
        },
        options: {
            lang:  'es',
            modal: true,
            paymentMethods: { tarjeta: true, yape: false, billetera: false, bancaMovil: false, agente: false, cuotealo: false }
        }
    });

    // 3. Callback cuando se genera el token
    culqi.culqi = async function() {
        if (culqi.token) {
            const btn = document.getElementById('payBtn');
            btn.disabled = true;
            setStatus('Procesando pago…');
            try {
                const res = await fetch('/api/payments/charge', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token:  culqi.token.id,
                        amount: 15.99,
                        email:  culqi.token.email || 'cliente@vendix.app'
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Error al pagar');
                setStatus('✓ Pago exitoso');
                btn.textContent = '✓ Pagado';
            } catch (err) {
                btn.disabled = false;
                setStatus('❌ ' + err.message);
            }
        } else if (culqi.error) {
            setStatus('❌ ' + (culqi.error.user_message || 'Error en el pago'));
        }
    };
}

// 4. Abrir modal
function pagar() {
    if (!culqi) { setStatus('Cargando, intenta de nuevo…'); return; }
    culqi.open();
}
</script>
</body>
</html>
